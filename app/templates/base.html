<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NewFace – Monitor de Reconhecimento Facial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #13161e;
      --border:    #1e2330;
      --accent:    #00e5ff;
      --accent2:   #7b61ff;
      --green:     #00c97a;
      --red:       #ff4d6a;
      --yellow:    #f5c542;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--accent);
    }
    .logo span { color: var(--muted); font-weight: 400; }

    #sync-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    .dot.idle  { background: var(--muted); animation: none; }
    .dot.error { background: var(--red); animation: none; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    main { padding: 24px 28px; }

    /* Stats cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
    }
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
    }
    .stat-value.green { color: var(--green); }
    .stat-value.purple { color: var(--accent2); }
    .stat-value.yellow { color: var(--yellow); }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 13px;
      padding: 10px 18px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn:hover  { color: var(--text); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead tr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      font-weight: 500;
      white-space: nowrap;
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      white-space: nowrap;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,.03); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
    }
    .badge.exact  { background: rgba(0,201,122,.15); color: var(--green); }
    .badge.new    { background: rgba(123,97,255,.15); color: var(--accent2); }
    .badge.male   { background: rgba(0,229,255,.12); color: var(--accent); }
    .badge.female { background: rgba(245,197,66,.12); color: var(--yellow); }

    .mono { font-family: var(--mono); font-size: 12px; color: var(--muted); }

    /* Botão coletar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn.secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* Editar nome */
    .nome-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nome-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      padding: 4px 8px;
      width: 160px;
    }
    .nome-input:focus { outline: none; border-color: var(--accent); }
    .save-btn {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
    }

    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      color: var(--text);
      padding: 12px 18px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
      z-index: 999;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">NEW<span>FACE</span></div>
    <div id="sync-badge">
      <div class="dot idle" id="sync-dot"></div>
      <span id="sync-text">Aguardando...</span>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <div id="toast"></div>

  <script>
    function showToast(msg, color = 'var(--accent)') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.borderLeftColor = color;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 3000);
    }

    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
