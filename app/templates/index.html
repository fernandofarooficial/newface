{% extends "base.html" %}

{% block content %}
<!-- Stats -->
<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-label">Total de Eventos</div>
    <div class="stat-value" id="stat-eventos">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Pessoas Únicas</div>
    <div class="stat-value purple" id="stat-pessoas">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Rostos Conhecidos</div>
    <div class="stat-value green" id="stat-conhecidos">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Rostos Novos</div>
    <div class="stat-value yellow" id="stat-novos">—</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" data-tab="eventos" onclick="switchTab('eventos')">Eventos Recentes</button>
  <button class="tab-btn" data-tab="pessoas" onclick="switchTab('pessoas')">Pessoas</button>
</div>

<!-- Tab: Eventos -->
<div id="tab-eventos" class="tab-panel active">
  <!-- Barra de filtros -->
  <div class="filter-bar">
    <div class="filter-group">
      <label class="filter-label">De</label>
      <input type="date" id="f-date-from" class="filter-input" onchange="loadEventos()">
    </div>
    <div class="filter-group">
      <label class="filter-label">Até</label>
      <input type="date" id="f-date-to" class="filter-input" onchange="loadEventos()">
    </div>
    <div class="filter-group">
      <label class="filter-label">Pessoa</label>
      <select id="f-pessoa" class="filter-select" onchange="loadEventos()">
        <option value="">Todas</option>
      </select>
    </div>
    <div class="filter-group">
      <label class="filter-label">Estabelecimento</label>
      <select id="f-estabelecimento" class="filter-select" onchange="onEstabelecimentoChange()">
        <option value="">Todos</option>
      </select>
    </div>
    <div class="filter-group">
      <label class="filter-label">Câmera</label>
      <select id="f-camera" class="filter-select" onchange="loadEventos()">
        <option value="">Todas</option>
      </select>
    </div>
    <div class="filter-group">
      <label class="filter-label" style="cursor:pointer;display:flex;align-items:center;gap:5px">
        <input type="checkbox" id="f-has-matches" onchange="loadEventos()"
               style="accent-color:var(--accent2);width:14px;height:14px;cursor:pointer">
        Com matches
      </label>
    </div>
    <div class="filter-actions">
      <button class="btn secondary" onclick="clearFiltros()">✕ Limpar</button>
    </div>
  </div>

  <div class="toolbar">
    <span class="mono" id="eventos-count">Carregando...</span>
    <div style="display:flex;gap:8px">
      <button class="btn secondary" onclick="loadEventos()">↻ Atualizar</button>
      <button class="btn" id="btn-coletar" onclick="coletar()">⬇ Coletar Agora</button>
    </div>
  </div>
  <div class="pessoas-rows" id="eventos-grid">
    <div class="eventos-empty">Carregando...</div>
  </div>
</div>

<!-- Tab: Pessoas -->
<div id="tab-pessoas" class="tab-panel">
  <div class="toolbar">
    <span class="mono" id="pessoas-count">Carregando...</span>
    <button class="btn secondary" onclick="loadPessoas()">↻ Atualizar</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Gênero</th>
          <th>Faixa Etária</th>
          <th>Primeira Detecção</th>
          <th>Última Detecção</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="tbody-pessoas">
        <tr><td colspan="7" style="text-align:center;color:var(--muted);padding:32px">Carregando...</td></tr>
      </tbody>
    </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const BASE = '{{ request.script_root }}';

  function fmtTs(ts) {
    if (!ts) return '—';
    return new Date(ts).toLocaleString('pt-BR', {timeZone:'America/Sao_Paulo',
      day:'2-digit', month:'2-digit', year:'numeric',
      hour:'2-digit', minute:'2-digit', second:'2-digit'});
  }

  function fmtTsCard(ts) {
    if (!ts) return '<span style="color:var(--border)">—</span>';
    const d = new Date(ts);
    const date = d.toLocaleDateString('pt-BR', {timeZone:'America/Sao_Paulo',
      day:'2-digit', month:'2-digit', year:'2-digit'});
    const time = d.toLocaleTimeString('pt-BR', {timeZone:'America/Sao_Paulo',
      hour:'2-digit', minute:'2-digit', second:'2-digit'});
    return `${date}<br>${time}`;
  }

  function genderBadge(g) {
    if (!g) return '<span class="mono">—</span>';
    return `<span class="badge ${g.toLowerCase()}">${g}</span>`;
  }

  // ---- Status ----
  async function loadStatus() {
    try {
      const r = await fetch(BASE + '/api/status');
      const d = await r.json();
      document.getElementById('stat-eventos').textContent    = d.stats.total_eventos ?? '—';
      document.getElementById('stat-pessoas').textContent    = d.stats.total_pessoas ?? '—';
      document.getElementById('stat-conhecidos').textContent = d.stats.deteccoes_conhecidas ?? '—';
      document.getElementById('stat-novos').textContent      = d.stats.deteccoes_novas ?? '—';

      const dot  = document.getElementById('sync-dot');
      const text = document.getElementById('sync-text');
      const s = d.sync.status;
      dot.className = 'dot ' + (s === 'running' ? '' : s === 'error' ? 'error' : 'idle');
      text.textContent = d.sync.mensagem || ('Status: ' + s);
    } catch(e) {
      document.getElementById('sync-text').textContent = 'Erro ao buscar status';
    }
  }

  // ---- Cards de evento ----
  function photoCol(url, ts) {
    const img = url
      ? `<img src="${BASE}/api/face-image?path=${encodeURIComponent(url)}"
             loading="lazy" onclick="openImg(this.src)"
             onerror="this.style.display='none'">`
      : `<div class="evento-photo-placeholder">?</div>`;
    return `<div class="evento-photo-col">${img}<div class="evento-photo-ts">${fmtTsCard(ts)}</div></div>`;
  }

  // match: objeto match ou null (força ausência de foto de referência)
  function renderEventoCard(e, match) {
    const qualPct  = e.face_quality != null ? (e.face_quality * 100).toFixed(0) : null;
    const matchPct = e.match_score  != null ? (e.match_score  * 100).toFixed(0)
                   : match && match.similarity != null ? (match.similarity * 100).toFixed(0)
                   : null;

    const typeBadge = e.match_type
      ? `<span class="badge ${e.match_type}" style="font-size:9px;padding:1px 5px">${e.match_type}</span>`
      : '';

    return `
    <div class="evento-card ${match ? 'dual' : 'single'}">
      <div class="evento-photos">
        ${photoCol(e.face_image_url, e.timestamp_evento)}
        ${match ? photoCol(match.face_image_url, match.timestamp_ref) : ''}
      </div>
      <div class="evento-card-body">
        <div class="evento-card-cam">
          <span class="evento-card-cam-id">${e.camera_id || '—'}</span>
          ${typeBadge}
        </div>
        <div class="evento-card-metrics">
          ${qualPct  != null ? `<span class="metric-o">O:${qualPct}%</span>`  : ''}
          ${matchPct != null ? `<span class="metric-r">R:${matchPct}%</span>` : ''}
        </div>
      </div>
    </div>`;
  }

  // ---- Linha de pessoa ----
  function renderPessoaRow(item) {
    const p   = item.pessoa;
    const evs = item.eventos;

    const nome  = p.nome && p.nome !== '—' ? p.nome : 'Anônimo';
    const meta  = [p.genero_estimado, p.faixa_etaria].filter(Boolean).join(' · ');
    const count = p.total_deteccoes != null
      ? `${p.total_deteccoes} detecção(ões)`
      : `${evs.length} evento(s)`;

    // URLs que já aparecem como foto principal: não devem ser repetidas como foto de match
    const primaryUrls = new Set(evs.map(e => e.face_image_url).filter(Boolean));

    const cardsHtml = evs.map(e => {
      const best = e.matches && e.matches.length > 0 ? e.matches[0] : null;
      // Mostra a foto de referência apenas se ela não é foto principal de nenhum outro card
      const matchToShow = (best && best.face_image_url && !primaryUrls.has(best.face_image_url))
        ? best : null;
      return renderEventoCard(e, matchToShow);
    }).join('');

    return `
    <div class="pessoa-row">
      <div class="pessoa-row-info">
        <div class="pessoa-row-code">${p.person_unique_id || '—'}</div>
        <div class="pessoa-row-nome">${nome}</div>
        ${meta ? `<div class="pessoa-row-meta">${meta}</div>` : ''}
        <div class="pessoa-row-count">${count}</div>
      </div>
      <div class="pessoa-row-eventos">
        ${cardsHtml}
      </div>
    </div>`;
  }

  // ---- Filtros ----
  let allCameras = [];

  async function loadFiltroOptions() {
    const [rCam, rEst, rPes] = await Promise.all([
      fetch(BASE + '/api/cameras'),
      fetch(BASE + '/api/estabelecimentos'),
      fetch(BASE + '/api/pessoas?limit=200'),
    ]);
    allCameras = await rCam.json();
    const estabelecimentos = await rEst.json();
    const pessoasData = await rPes.json();

    const selEst = document.getElementById('f-estabelecimento');
    estabelecimentos.forEach(e => {
      const o = document.createElement('option');
      o.value = e.id;
      o.textContent = e.nome;
      selEst.appendChild(o);
    });

    filterCameras('');

    const selPes = document.getElementById('f-pessoa');
    (pessoasData.items || []).forEach(p => {
      const o = document.createElement('option');
      o.value = p.id;
      o.textContent = p.nome !== '—' ? `${p.nome} (${p.person_unique_id})` : p.person_unique_id;
      selPes.appendChild(o);
    });
  }

  function filterCameras(estId) {
    const sel = document.getElementById('f-camera');
    const prev = sel.value;
    sel.innerHTML = '<option value="">Todas</option>';
    const list = estId ? allCameras.filter(c => String(c.estabelecimento_id) === String(estId)) : allCameras;
    list.forEach(c => {
      const o = document.createElement('option');
      o.value = c.camera_id;
      o.textContent = c.camera_id;
      sel.appendChild(o);
    });
    if (list.some(c => c.camera_id === prev)) sel.value = prev;
  }

  function onEstabelecimentoChange() {
    filterCameras(document.getElementById('f-estabelecimento').value);
    document.getElementById('f-camera').value = '';
    loadEventos();
  }

  function clearFiltros() {
    document.getElementById('f-date-from').value = '';
    document.getElementById('f-date-to').value = '';
    document.getElementById('f-pessoa').value = '';
    document.getElementById('f-estabelecimento').value = '';
    document.getElementById('f-has-matches').checked = false;
    filterCameras('');
    document.getElementById('f-camera').value = '';
    loadEventos();
  }

  // ---- Eventos ----
  async function loadEventos() {
    const grid = document.getElementById('eventos-grid');
    grid.innerHTML = '<div class="eventos-empty">Carregando...</div>';

    const params = new URLSearchParams();
    const dateFrom   = document.getElementById('f-date-from')?.value;
    const dateTo     = document.getElementById('f-date-to')?.value;
    const pessoaId   = document.getElementById('f-pessoa')?.value;
    const storeId    = document.getElementById('f-estabelecimento')?.value;
    const cameraId   = document.getElementById('f-camera')?.value;
    const hasMatches = document.getElementById('f-has-matches')?.checked;
    if (dateFrom)   params.set('date_from',   dateFrom);
    if (dateTo)     params.set('date_to',     dateTo);
    if (pessoaId)   params.set('pessoa_id',   pessoaId);
    if (storeId)    params.set('store_id',    storeId);
    if (cameraId)   params.set('camera_id',   cameraId);
    if (hasMatches) params.set('has_matches', '1');

    try {
      const r = await fetch(BASE + '/api/pessoas-eventos?' + params);
      const d = await r.json();
      document.getElementById('eventos-count').textContent =
        `${d.total} pessoa(s) · ${d.items.reduce((s, i) => s + i.eventos.length, 0)} evento(s)`;
      if (!d.items.length) {
        grid.innerHTML = '<div class="eventos-empty">Nenhum evento encontrado</div>';
        return;
      }
      grid.innerHTML = d.items.map(item => renderPessoaRow(item)).join('');
    } catch(e) {
      grid.innerHTML = `<div class="eventos-empty" style="color:var(--red)">Erro: ${e.message}</div>`;
    }
  }

  // ---- Pessoas ----
  async function loadPessoas() {
    const tbody = document.getElementById('tbody-pessoas');
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:20px">Carregando...</td></tr>';
    try {
      const r = await fetch(BASE + '/api/pessoas?limit=100');
      const d = await r.json();
      document.getElementById('pessoas-count').textContent = `${d.total} pessoas identificadas`;
      if (!d.items.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:32px">Nenhuma pessoa encontrada</td></tr>';
        return;
      }
      tbody.innerHTML = d.items.map(p => `
        <tr>
          <td class="mono">${p.person_unique_id}</td>
          <td>
            <div class="nome-cell">
              <input class="nome-input" id="nome-${p.id}" value="${p.nome !== '—' ? p.nome : ''}" placeholder="Adicionar nome...">
              <button class="save-btn" title="Salvar" onclick="salvarNome(${p.id})">✓</button>
            </div>
          </td>
          <td>${genderBadge(p.genero_estimado)}</td>
          <td class="mono">${p.faixa_etaria || '—'}</td>
          <td class="mono">${fmtTs(p.primeira_deteccao)}</td>
          <td class="mono">${fmtTs(p.ultima_deteccao)}</td>
          <td class="mono" style="color:var(--accent)">${p.total_deteccoes}</td>
        </tr>
      `).join('');
    } catch(e) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--red);padding:20px">Erro: ${e.message}</td></tr>`;
    }
  }

  // ---- Salvar nome ----
  async function salvarNome(pessoaId) {
    const nome = document.getElementById(`nome-${pessoaId}`).value.trim();
    try {
      const r = await fetch(`${BASE}/api/pessoas/${pessoaId}/nome`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({nome})
      });
      if (r.ok) showToast('Nome salvo com sucesso!');
      else showToast('Erro ao salvar nome', 'var(--red)');
    } catch(e) {
      showToast('Erro de conexão', 'var(--red)');
    }
  }

  // ---- Coletar ----
  async function coletar() {
    const btn = document.getElementById('btn-coletar');
    btn.disabled = true;
    btn.textContent = 'Coletando...';
    try {
      const r = await fetch(BASE + '/api/coletar', {method: 'POST'});
      const d = await r.json();
      showToast(`✓ ${d.inseridos} novos, ${d.ignorados} ignorados, ${d.erros} erros`);
      await loadStatus();
      await loadEventos();
    } catch(e) {
      showToast('Erro na coleta: ' + e.message, 'var(--red)');
    } finally {
      btn.disabled = false;
      btn.textContent = '⬇ Coletar Agora';
    }
  }

  // ---- Lightbox ----
  function openImg(src) {
    const overlay = document.getElementById('img-overlay');
    document.getElementById('img-full').src = src;
    overlay.style.display = 'flex';
  }

  // ---- Init ----
  loadStatus();
  loadFiltroOptions().then(() => loadEventos());
  loadPessoas();
  setInterval(() => { loadStatus(); loadEventos(); }, 60_000);
</script>

<!-- Lightbox -->
<div id="img-overlay" onclick="this.style.display='none'"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center;cursor:zoom-out">
  <img id="img-full" src="" style="max-width:90vw;max-height:90vh;border-radius:8px;border:1px solid var(--border)">
</div>
{% endblock %}
